{{ define "main" }}
<section class="section container mt-5 pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      
      <h1 class="mb-3 text-center">{{ .Title }}</h1>

      {{ with .Params.description }}
        <p class="lead text-center mb-5">{{ . }}</p>
      {{ end }}

      <div class="content">
        {{ .Content }}
      </div>

    </div>
  </div>
</section>
{{ end }}
